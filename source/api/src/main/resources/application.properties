# Override the management endpoint to incorporate /api
management.endpoints.web.base-path=/api/actuator

# ClickHouse (catalog and matrix data)
spring.datasource.url=jdbc:ch:http://localhost:8123/smm
spring.datasource.username=aerius
spring.datasource.password=aerius
spring.datasource.driver-class-name=com.clickhouse.jdbc.ClickHouseDriver

# Schema migrations (API creates tables; database container only provides empty ClickHouse)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Public API path prefix (OpenAPI server URL used for example in self-links)
aerius.endpoints.base-path=/api/v1

# Custom config properties
aerius.async.core-pool-size=3
aerius.async.max-pool-size=10
aerius.async.queue-capacity=100
aerius.async.thread-name-prefix=req-
