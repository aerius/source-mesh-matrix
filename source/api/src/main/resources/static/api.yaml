openapi: 3.1.0

info:
  title: Source Mesh Matrix Public API
  description: |
    Generic public service to query 'SMM' (source mesh matrix) values.
  license:
    name: Apache License, version 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: 0.0.1

servers:
  - url: /api/v1
    description: Deployment server
  - url: http://localhost:8080/api/v1
    description: Development server

tags: []

paths:
  /matrix/query:
    post:
      summary: Start matrix query
      operationId: createMatrixQuery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatrixQueryRequest'
      responses:
        '202':
          description: Query accepted (for asynchronous processing)
          headers:
            Location:
              $ref: '#/components/headers/LocationHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatrixQueryStatusResponse'
        '400':
          description: Invalid request
        '500':
          description: Internal server error

  /matrix/query/status/{queryId}:
    get:
      summary: Get matrix query status
      operationId: getMatrixQueryStatus
      parameters:
        - name: queryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Query status
          headers:
            Location:
              $ref: '#/components/headers/LocationHeader'
            Retry-After:
              $ref: '#/components/headers/RetryAfterHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatrixQueryStatusResponse'
        '404':
          description: Query not found
        '500':
          description: Internal server error

  /matrix/query/{queryId}:
    get:
      summary: Get matrix query result
      operationId: getMatrixQueryResult
      parameters:
        - name: queryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Query result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatrixQueryResultResponse'
        '404':
          description: Query not found
        '500':
          description: Internal server error


components:
  headers:
    LocationHeader:
      description: The URL to poll for the current status of the asynchronous query
      schema:
        type: string
        format: uri

    RetryAfterHeader:
      description: The suggested polling interval in seconds
      schema:
        type: integer

  schemas:
    Point:
      type: object
      additionalProperties: false
      properties:
        x:
          type: integer
        y:
          type: integer
      required:
        - x
        - y
      examples:
        - x: 100
          y: 200

    Receptor:
      type: integer
      description: Receptor ID
      examples:
        - 100001

    Substance:
      type: string
      description: Substance
      examples:
        - "NOx"
        - "NH3"

    MatrixQueryRequest:
      type: object
      description: >
        Parameters for submitting a matrix query.
      additionalProperties: false
      properties:
        calculation_version:
          description: Filter by calculation version
          type: string
        substances:
          description: Filter by substance(s)
          type: array
          items:
            $ref: "#/components/schemas/Substance"
        source_characteristics:
          type: object
          description: Filter by source characteristics
          additionalProperties: false
          properties:
            height:
              description: Filter by source height
              type: number
            heat_content:
              description: Filter by heat content
              type: number
            spread:
              description: Filter by spread
              type: number
            emission_diurnal_variation:
              description: Filter by emission diurnal variation ID
              type: integer
          required:
            - height
            - heat_content
            - spread
            - emission_diurnal_variation
          examples:
            - height: 1.0
              heat_content: 10.5
              spread: 1.0
              emission_diurnal_variation: 2
              particle_size_distribution: 0
        receptors:
          description: Filter by receptor ID(s)
          type: array
          items:
            $ref: '#/components/schemas/Receptor'
        source_points:
          description: List of exact source coordinate points.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Point'
      required:
        - calculation_version
        - substances
        - source_characteristics
        - receptors
        - source_points
      examples:
        - calculation_version: "2025.2"
          substances: ["NO2", "NH3"]
          source_characteristics:
            height: 1.0
            heat_content: 10.5
            spread: 1.0
            emission_diurnal_variation: 2
            particle_size_distribution: 0
          receptors: [100001, 100002]
          source_points:
            - x: 100
              y: 200
            - x: 150
              y: 250

    MatrixQueryStatusResponse:
      type: object
      description: >
        Represents the current status of an asynchronous matrix query.
      additionalProperties: false
      properties:
        status:
          description: The current processing status of the query
          type: string
          enum:
            - Processing
            - Completed
        statusUrl:
          description: The URL to poll for the current status of the asynchronous query
          type: string
          format: uri
      required:
        - status
        - statusUrl
      examples:
        - status: "Processing"
          statusUrl: "/api/v1/matrix/query/status/123"
        - status: "Completed"
          statusUrl: "/api/v1/matrix/query/status/123"

    MatrixQueryResultResponse:
      type: object
      description: >
        Query result containing the original query and the resulting matrix records.
        The records only include fields that vary per result.
        Fields provided in the query are not repeated in each record to avoid redundancy.
      additionalProperties: false
      properties:
        query:
          $ref: '#/components/schemas/MatrixQueryRequest'
        records:
          type: array
          description: Matching matrix values for the submitted query
          items:
            $ref: '#/components/schemas/MatrixResultRecord'
      required:
        - query
        - records
      examples:
        - query:
            calculation_version: "2025.2"
            substances: ["NO2"]
            receptors: [100001]
            source_points:
              - x: 100
                y: 200
          records:
            - source_point:
                x: 100
                y: 200
              receptor: 100001
              substance: "NO2"
              value: 12.34

    MatrixResultRecord:
      type: object
      description: >
        Represents a single matrix result row.
      additionalProperties: false
      properties:
        source_point:
          $ref: '#/components/schemas/Point'
        receptor:
          $ref: '#/components/schemas/Receptor'
        substance:
          $ref: '#/components/schemas/Substance'
        value:
          type: number
          format: float
          description: Calculated matrix value
      required:
        - source_point
        - receptor
        - substance
        - value
      examples:
        - source_point:
            x: 100
            y: 200
          receptor: 100001
          substance: "NO2"
          value: 12.34
